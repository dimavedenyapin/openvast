# Model registry for vast-tui.py
#
# `min_vram_gb` drives the "only show GPUs that fit" filter in the launch flow.
# Anything under `defaults` is applied to every model unless the model overrides
# it. Add a new model by copying an entry and changing key / hf / min_vram_gb.
#
# Fields:
#   key           unique id, used as the label on the vast instance + opencode model id
#   name          human label shown in the UI and opencode
#   hf            llama.cpp -hf argument (repo:quant)
#   min_vram_gb   minimum single-card VRAM; offers below this are hidden
#   disk_gb       instance disk size (must exceed the model download size)
#   context       -c context length
#   port          container port llama-server binds (default 18000)
#   image         docker image (default from `defaults.image`)
#   extra_args    extra llama-server flags
#   output_limit  opencode output token limit
#   tool_call     advertise tool calling to opencode
#   reasoning     model emits reasoning_content (thinking)
#
# Sizes below are the Q4 GGUF footprint, verified against the HuggingFace API.
# min_vram_gb is set to the smallest common vast card tier that holds the model
# plus room for KV cache / compute buffers.

defaults:
  image: vastai/llama-cpp:b9628-cuda-12.9
  port: 18000
  extra_args: "--jinja -fa on --cache-type-k q8_0 --cache-type-v q8_0 --metrics"
  output_limit: 8192
  tool_call: true
  reasoning: true

default_model: qwen3.6-35b-a3b

models:
  # ----------------------------------------------------------------- 16 GB tier
  - key: gpt-oss-20b
    name: gpt-oss 20B (OpenAI, Q4)         # ~11.6 GB · reasoning MoE, fast
    hf: unsloth/gpt-oss-20b-GGUF:Q4_K_M
    min_vram_gb: 16
    disk_gb: 50
    context: 65536

  - key: qwen3-14b
    name: Qwen3 14B (Q4)                   # ~9.0 GB
    hf: unsloth/Qwen3-14B-GGUF:Q4_K_M
    min_vram_gb: 16
    disk_gb: 50
    context: 65536

  - key: phi-4
    name: Phi-4 14B (Q4)                   # ~8.9 GB · reasoning-light
    hf: unsloth/phi-4-GGUF:Q4_K_M
    min_vram_gb: 16
    disk_gb: 50
    context: 16384
    reasoning: false

  - key: gemma-4-12b
    name: Gemma 4 12B dense (Q4)           # ~7.1 GB · vision (verify arch support)
    hf: unsloth/gemma-4-12b-it-GGUF:Q4_K_M
    min_vram_gb: 16
    disk_gb: 50
    context: 65536
    reasoning: false

