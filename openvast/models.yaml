# ---------------------------------------------------------------------------
# Notes:
# - "verify arch" models (Gemma 4, Llama 4, Qwen3-Next, Qwen3-235B) load only if
#   the llama.cpp image is recent enough. b9628 supports Qwen3-Next (>=b7186) and
#   Llama 4; Gemma 4 is newest — check the `l` log view on first launch, and if
#   it fails, bump `image:` to a newer vastai/llama-cpp tag.
# - Qwen3.6-35B == qwen3.6-35b-a3b above (the "35B" is that MoE's total params;
#   there is no separate dense 35B). An `-MTP` speculative-decoding variant
#   exists but needs extra draft-model config.
# - NOT added — needs a Step-enabled llama.cpp fork, not the stock image:
#   StepFun Step-3.7-Flash — 198B MoE VL. GGUF IQ3_XXS 75.8GB (80GB, tight),
#   IQ4_XS 105GB (H200 141GB). Set a custom `image:` with Step support to use it.
# - Too big for one 96GB card even at Q2 (multi-GPU only): GLM-4.6 (216GB),
#   DeepSeek-V3.1 (405GB), GLM-5 (431GB), MiniMax-M3 (264GB), Kimi-K2.6 (584GB).
